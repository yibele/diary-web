<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>智能日记记录</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Noto+Sans+SC:wght@400;500;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="bg-mesh"></div>
    <main class="app">
      <header class="hero">
        <p class="tag">Smart Diary</p>
        <h1>写一段日记，自动记录花费和体重</h1>
        <p class="desc">你只要写内容，系统会自动提取并记账、记体重，再生成图表。</p>
      </header>

      <section class="auth-wrap" id="auth-card">
        <section class="auth-x-card">
          <div class="x-logo" aria-hidden="true">X</div>

          <section class="auth-panel active" id="auth-login-panel">
            <h2 class="auth-title">登录到你的账号</h2>
            <form id="login-form" class="form auth-form">
              <label>
                邮箱
                <input type="email" name="email" placeholder="you@example.com" required />
              </label>
              <label>
                密码
                <input type="password" name="password" minlength="6" placeholder="输入密码" required />
              </label>
              <button type="submit" class="auth-primary-btn">登录</button>
            </form>
            <p class="auth-switch-text">
              还没有账号？
              <button type="button" class="auth-link-btn" id="go-register-btn">创建账号</button>
            </p>
          </section>

          <section class="auth-panel" id="auth-register-panel">
            <h2 class="auth-title">创建你的账号</h2>
            <form id="register-form" class="form auth-form">
              <label>
                邮箱
                <input type="email" name="email" placeholder="you@example.com" required />
              </label>
              <label>
                密码
                <input type="password" name="password" minlength="6" placeholder="至少 6 位" required />
              </label>
              <button type="submit" class="auth-primary-btn">创建账号</button>
            </form>
            <p class="auth-switch-text">
              已经有账号？
              <button type="button" class="auth-link-btn" id="go-login-btn">去登录</button>
            </p>
          </section>

          <p id="auth-msg" class="auth-msg" aria-live="polite"></p>
        </section>
      </section>

      <section class="card session-bar hidden" id="session-bar">
        <p id="user-email"></p>
        <button type="button" id="logout-btn" class="delete-btn">退出登录</button>
      </section>

      <div id="app-content" class="hidden">
        <section class="stats" id="stats"></section>

        <section class="card compose-card">
          <div class="section-head">
            <h2>写今天的日记</h2>
            <p>提交后自动提取花费和体重并保存。</p>
          </div>
          <form id="diary-form" class="form">
            <label>
              日期
              <input type="date" name="date" required />
            </label>
            <label>
              标题（可选）
              <input type="text" name="title" maxlength="60" placeholder="比如：普通的一天" />
            </label>
            <label>
              正文
              <textarea name="content" rows="8" placeholder="今天早饭 12 元，中午 28 元，体重 63.4kg..." required></textarea>
            </label>
            <button type="submit" id="save-diary-btn">保存并自动提取</button>
          </form>
          <div id="extract-result" class="result-box">还没有提取结果。</div>
        </section>

        <section class="card dashboard-card">
          <div class="section-head">
            <h2>数据看板</h2>
            <p>按月查看花费和体重变化。</p>
          </div>
          <div class="month-row">
            <label>
              查看月份
              <input type="month" id="dashboard-month" />
            </label>
          </div>

          <div class="dashboard-grid">
            <div class="card-inset">
              <h3 class="panel-title">本月花费记录</h3>
              <div class="table-wrap">
                <table>
                  <thead>
                    <tr>
                      <th>日期</th>
                      <th>项目</th>
                      <th>金额（元）</th>
                    </tr>
                  </thead>
                  <tbody id="expense-table-body"></tbody>
                </table>
              </div>
            </div>

            <div class="card-inset">
              <h3 class="panel-title">本月体重曲线</h3>
              <div id="weight-chart" class="chart-box"></div>
              <div class="table-wrap">
                <table>
                  <thead>
                    <tr>
                      <th>日期</th>
                      <th>体重（kg）</th>
                    </tr>
                  </thead>
                  <tbody id="weight-table-body"></tbody>
                </table>
              </div>
            </div>
          </div>
        </section>

        <section class="card history-card">
          <div class="section-head">
            <h2>日记记录</h2>
            <p>每条日记都附带自动提取结果。</p>
          </div>
          <ul id="diary-list" class="entry-list"></ul>
        </section>
      </div>
    </main>

    <template id="empty-template">
      <li class="empty">还没有记录，先写第一条吧。</li>
    </template>

    <script src="script.js"></script>
  </body>
</html>
